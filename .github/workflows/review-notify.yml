name: Review Notify

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    name: Notify Claude Code
    runs-on: self-hosted
    steps:
      - name: Log review event
        run: |
          echo "Review received!"
          echo "PR: #${{ github.event.pull_request.number }}"
          echo "Reviewer: ${{ github.event.review.user.login }}"
          echo "State: ${{ github.event.review.state }}"
          echo "PR Creator: ${{ github.event.pull_request.user.login }}"
          echo "Branch: ${{ github.event.pull_request.head.ref }}"
          echo "Repo: ${{ github.repository }}"
          echo "TEST: This workflow triggers on pull_request_review"
