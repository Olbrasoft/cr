name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo clippy --workspace --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cr_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U test -d cr_test" --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/cr_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli@0.8.6 --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run --source cr-infra/migrations

      - name: Run tests
        run: cargo test --workspace --locked
        env:
          SQLX_OFFLINE: false

  deploy:
    name: Deploy to production
    runs-on: self-hosted
    needs: [check, fmt, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        id: validate
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "::error::Missing required secrets: VPS_HOST, VPS_SSH_KEY, VPS_SSH_PORT"
            exit 1
          fi

      - name: Sync to server
        id: sync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='target/' --exclude='.git/' --exclude='.env' --exclude='data/images/' --exclude='data/porovnani/'
          path: ./
          remote_path: /opt/cr/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_SSH_PORT }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and restart
        id: build_restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/cr
            docker compose build web
            docker compose up -d web

      - name: Health check
        id: health_check
        run: |
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://ceskarepublika.wiki/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
          done
          echo "Health check failed after 60 seconds"
          exit 1

      - name: Write deploy event for Claude Code
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          EVENTS_DIR="$HOME/.config/claude-channels/deploy-events"
          mkdir -p "$EVENTS_DIR"

          # Detect which step failed
          FAILED_STEP=""
          if [ "${{ steps.validate.outcome }}" = "failure" ]; then
            FAILED_STEP="validate"
          elif [ "${{ steps.sync.outcome }}" = "failure" ]; then
            FAILED_STEP="sync"
          elif [ "${{ steps.build_restart.outcome }}" = "failure" ]; then
            FAILED_STEP="build-restart"
          elif [ "${{ steps.health_check.outcome }}" = "failure" ]; then
            FAILED_STEP="health-check"
          fi

          if command -v jq >/dev/null 2>&1; then
            COMMIT_SHA="${GITHUB_SHA:0:7}"
            # Use a run-unique filename so concurrent deploys, re-runs, and
            # multiple deploys of the same commit do not overwrite each other.
            # See Olbrasoft/GitHub.Actions.Notify PR #22 + #23 for the design.
            EVENT_FILE="$EVENTS_DIR/Olbrasoft-cr-deploy-${COMMIT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
            jq -n \
              --arg event "deploy-complete" \
              --arg status "${{ job.status }}" \
              --arg failedStep "$FAILED_STEP" \
              --arg repository "${{ github.repository }}" \
              --arg commit "$COMMIT_SHA" \
              --arg commitMessage "$(git log -1 --pretty=%s 2>/dev/null || echo unknown)" \
              --arg runUrl "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg environment "production" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{event: $event, status: $status, failedStep: $failedStep, repository: $repository, commit: $commit, commitMessage: $commitMessage, runUrl: $runUrl, environment: $environment, timestamp: $timestamp}' \
              > "$EVENT_FILE"

            # Retain recent deploy event files only so the persistent self-hosted
            # runner does not accumulate unbounded JSON files over time. Successfully
            # delivered events are deleted by wake-claude.sh after the consumer ack;
            # this cleanup catches the few that drop on dead session and any leftover.
            find "$EVENTS_DIR" -maxdepth 1 -type f -name 'Olbrasoft-cr-deploy-*.json' -mtime +14 -delete 2>/dev/null || true

            # Wake ALL Claude Code sessions for this repo via FIFO (only after successful event write)
            WAKE_SCRIPT="$HOME/.claude/hooks/wake-claude.sh"
            if [ -x "$WAKE_SCRIPT" ]; then
              "$WAKE_SCRIPT" "${GITHUB_REPOSITORY}" || true
            fi
          else
            echo "jq is not installed on this runner; skipping deploy event write." >&2
          fi

  verify:
    name: Verify production
    runs-on: self-hosted
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deployment propagation
        run: sleep 10

      - name: Verify production
        uses: Olbrasoft/GitHub.Actions.Notify/actions/playwright-verify@v1
        with:
          url: https://ceskarepublika.wiki
          checks: health,homepage
          repository: ${{ github.repository }}
          send-notification: 'false'

      - name: Write verify event for Claude Code
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          EVENTS_DIR="$HOME/.config/claude-channels/deploy-events"
          mkdir -p "$EVENTS_DIR"

          if command -v jq >/dev/null 2>&1; then
            COMMIT_SHA="${GITHUB_SHA:0:7}"
            # Run-unique filename — same rationale as the deploy event above.
            EVENT_FILE="$EVENTS_DIR/Olbrasoft-cr-verify-${COMMIT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
            jq -n \
              --arg event "verify-complete" \
              --arg status "${{ job.status }}" \
              --arg repository "${{ github.repository }}" \
              --arg commit "$COMMIT_SHA" \
              --arg environment "production" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{event: $event, status: $status, repository: $repository, commit: $commit, environment: $environment, timestamp: $timestamp}' \
              > "$EVENT_FILE"

            # Retain recent verify event files only (same rationale as deploy).
            find "$EVENTS_DIR" -maxdepth 1 -type f -name 'Olbrasoft-cr-verify-*.json' -mtime +14 -delete 2>/dev/null || true

            # Wake ALL Claude Code sessions for this repo via FIFO (only after successful event write)
            WAKE_SCRIPT="$HOME/.claude/hooks/wake-claude.sh"
            if [ -x "$WAKE_SCRIPT" ]; then
              "$WAKE_SCRIPT" "${GITHUB_REPOSITORY}" || true
            fi
          else
            echo "jq is not installed on this runner; skipping verify event write." >&2
          fi
