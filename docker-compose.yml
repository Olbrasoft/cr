services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cr
      POSTGRES_USER: cr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cr -d cr"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      RUST_LOG: info
      STATIC_DIR: /app/static
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      YTDLP_COOKIES: ${YTDLP_COOKIES:-}
      CZ_PROXY_URL: ${CZ_PROXY_URL:-}
      CZ_PROXY_KEY: ${CZ_PROXY_KEY:-}
      # Streamtape + R2 for the hosted video library on /stahnout-video/
      STREAMTAPE_LOGIN: ${STREAMTAPE_LOGIN:-}
      STREAMTAPE_KEY: ${STREAMTAPE_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
